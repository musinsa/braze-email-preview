<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Email Previewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-html.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg2: #18181c;
    --bg3: #1e1e24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e8ea;
    --text2: #888890;
    --text3: #555560;
    --accent: #7b6ef6;
    --accent-dim: rgba(123,110,246,0.15);
    --success: #4caf7d;
    --danger: #e05c5c;
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    --sans: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { display: block; }
  .live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text2);
    font-family: var(--mono);
    padding: 2px 9px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .btn {
    font-size: 12px; font-family: var(--sans); font-weight: 500;
    padding: 5px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .btn.primary {
    background: var(--accent-dim); color: var(--accent);
    border-color: rgba(123,110,246,0.35);
  }
  .btn.primary:hover { background: rgba(123,110,246,0.25); }
  .btn.danger:hover { color: var(--danger); border-color: rgba(224,92,92,0.4); }

  /* ── Split panel ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }
  .pane {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .pane:first-child { border-right: 1px solid var(--border); }

  .pane-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
    height: 36px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pane-label {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: var(--text2); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .pane-label svg { opacity: 0.6; }
  .pane-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  .fmt-flash {
    font-size: 11px; color: var(--success); font-family: var(--mono);
    display: none;
  }
  @keyframes fadeout { 0%,65%{opacity:1} 100%{opacity:0} }

  #html-input {
    flex: 1;
    resize: none; border: none; outline: none;
    font-family: var(--mono);
    font-size: 12.5px; line-height: 1.75;
    padding: 16px 18px;
    background: var(--bg); color: var(--text);
    overflow-y: auto;
    tab-size: 2;
  }
  #html-input::placeholder { color: var(--text3); }
  #html-input::-webkit-scrollbar { width: 6px; }
  #html-input::-webkit-scrollbar-track { background: transparent; }
  #html-input::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  #preview-frame {
    flex: 1; border: none; width: 100%;
    background: #ffffff;
  }

  /* ── Stringifier ── */
  .str-section {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .str-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; height: 38px;
    border-bottom: 1px solid var(--border);
  }
  .str-label {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: var(--text2); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .mode-group { display: flex; gap: 4px; }
  .mode-btn {
    font-size: 11px; font-family: var(--mono);
    padding: 2px 10px; border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text3);
    cursor: pointer; transition: all 0.15s;
  }
  .mode-btn:hover { color: var(--text2); border-color: var(--border2); }
  .mode-btn.active {
    background: var(--accent-dim); color: var(--accent);
    border-color: rgba(123,110,246,0.35);
  }

  .str-body { position: relative; }
  #stringified {
    width: 100%; height: 82px; resize: none; outline: none; border: none;
    font-family: var(--mono); font-size: 11.5px; line-height: 1.6;
    padding: 10px 100px 10px 18px;
    background: var(--bg); color: var(--text2);
    overflow-y: auto;
  }
  #stringified::placeholder { color: var(--text3); }
  #stringified::-webkit-scrollbar { height: 4px; width: 4px; }
  #stringified::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .copy-btn {
    position: absolute; right: 12px; top: 10px;
    font-size: 11px; font-family: var(--sans); font-weight: 500;
    padding: 4px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg2); color: var(--text);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover { border-color: var(--border2); background: var(--bg3); }
  .copy-btn.copied { color: var(--success); border-color: rgba(76,175,125,0.4); }

  /* ── Scrollbar global ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      HTML Email Previewer
    </div>
    <div class="live-badge">
      <span class="live-dot"></span>
      실시간 미리보기
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn primary" onclick="formatHTML()">⌘ Format HTML</button>
    <button class="btn" onclick="loadSample()">샘플 불러오기</button>
    <button class="btn danger" onclick="clearEditor()">초기화</button>
  </div>
</div>

<!-- Split -->
<div class="main">
  <div class="pane">
    <div class="pane-header">
      <div class="pane-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        HTML 편집기
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="fmt-flash" id="fmt-flash">✓ 포맷 완료</span>
        <span class="pane-meta" id="char-count">0 chars</span>
      </div>
    </div>
    <textarea id="html-input" spellcheck="false"
      placeholder="여기에 이메일 HTML을 붙여넣으세요&#10;붙여넣기 시 자동으로 포맷됩니다..."></textarea>
  </div>

  <div class="pane">
    <div class="pane-header">
      <div class="pane-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        미리보기
      </div>
      <span class="pane-meta" id="preview-status">대기 중</span>
    </div>
    <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
  </div>
</div>

<!-- Stringifier -->
<div class="str-section">
  <div class="str-header">
    <div class="str-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      String Stringifier
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;color:var(--text3)">출력 형식</span>
      <div class="mode-group">
        <button class="mode-btn active" id="btn-json" onclick="setMode('json')">JSON String</button>
        <button class="mode-btn" id="btn-tmpl" onclick="setMode('template')">Template Literal</button>
        <button class="mode-btn" id="btn-mini" onclick="setMode('minified')">Minified</button>
      </div>
    </div>
  </div>
  <div class="str-body">
    <textarea id="stringified" readonly spellcheck="false"
      placeholder="HTML을 입력하면 자동으로 문자열로 변환됩니다..."></textarea>
    <button class="copy-btn" id="copy-btn" onclick="copyStr()">복사</button>
  </div>
</div>

<script>
var mode = 'json';
var debounceTimer;

var beautifyOpts = {
  indent_size: 2,
  indent_char: ' ',
  max_preserve_newlines: 1,
  preserve_newlines: true,
  wrap_line_length: 0,
  end_with_newline: false,
  extra_liners: ['head','body','/html'],
  indent_inner_html: true,
  unformatted: ['span','a','b','i','strong','em','br']
};

function formatHTML() {
  var el = document.getElementById('html-input');
  if (!el.value.trim()) return;
  try {
    el.value = html_beautify(el.value, beautifyOpts);
    showFmtFlash();
    updateAll();
  } catch(e) {}
}

function showFmtFlash() {
  var f = document.getElementById('fmt-flash');
  f.style.display = 'inline';
  f.style.animation = 'none';
  void f.offsetWidth;
  f.style.animation = 'fadeout 1.8s forwards';
  setTimeout(function(){ f.style.display = 'none'; }, 1900);
}

function setMode(m) {
  mode = m;
  ['json','tmpl','mini'].forEach(function(k){
    document.getElementById('btn-'+k).classList.remove('active');
  });
  var map = {json:'json', template:'tmpl', minified:'mini'};
  document.getElementById('btn-'+map[m]).classList.add('active');
  updateStringifier(document.getElementById('html-input').value);
}

function updateAll() {
  var html = document.getElementById('html-input').value;
  document.getElementById('char-count').textContent = html.length.toLocaleString() + ' chars';
  updatePreview(html);
  updateStringifier(html);
}

function updatePreview(html) {
  var frame = document.getElementById('preview-frame');
  if (!html.trim()) {
    frame.srcdoc = '<body style="display:flex;align-items:center;justify-content:center;height:100%;font-family:sans-serif;color:#ccc;font-size:13px;margin:0;background:#fafafa"><p>HTML을 입력하면 여기에 렌더링됩니다</p></body>';
    document.getElementById('preview-status').textContent = '대기 중';
    return;
  }
  frame.srcdoc = html;
  document.getElementById('preview-status').textContent = '렌더링됨';
}

function updateStringifier(html) {
  if (!html.trim()) { document.getElementById('stringified').value = ''; return; }
  var out;
  if (mode === 'json') {
    out = JSON.stringify(html);
  } else if (mode === 'template') {
    out = '`' + html.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\${/g,'\\${') + '`';
  } else {
    var mini = html.replace(/<!--[\s\S]*?-->/g,'').replace(/\s+/g,' ').replace(/>\s+</g,'><').trim();
    out = JSON.stringify(mini);
  }
  document.getElementById('stringified').value = out;
}

function copyStr() {
  var val = document.getElementById('stringified').value;
  if (!val) return;
  var btn = document.getElementById('copy-btn');
  navigator.clipboard.writeText(val).then(function(){
    btn.textContent = '복사됨 ✓';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = '복사'; btn.classList.remove('copied'); }, 1800);
  }).catch(function(){
    document.getElementById('stringified').select();
    document.execCommand('copy');
  });
}

function clearEditor() {
  document.getElementById('html-input').value = '';
  updateAll();
}

function loadSample() {
  document.getElementById('html-input').value = '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>이메일</title></head><body style="margin:0;padding:0;background:#f4f4f4;font-family:\'Apple SD Gothic Neo\',Arial,sans-serif"><table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:40px 0"><tr><td align="center"><table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)"><tr><td style="background:#1a1a2e;padding:32px 40px;text-align:center"><h1 style="color:#fff;margin:0;font-size:24px;font-weight:600">Your Brand</h1></td></tr><tr><td style="padding:40px"><h2 style="margin:0 0 16px;font-size:20px;color:#1a1a2e;font-weight:600">안녕하세요, 홍길동 님 👋</h2><p style="margin:0 0 24px;font-size:15px;color:#555;line-height:1.7">저희 서비스를 이용해 주셔서 감사합니다.</p><div style="text-align:center;margin:32px 0"><a href="#" style="display:inline-block;background:#5b5ef4;color:#fff;text-decoration:none;padding:14px 36px;border-radius:6px;font-size:15px;font-weight:600">계정 확인하기</a></div></td></tr><tr><td style="padding:24px 40px;background:#f9f9f9;border-top:1px solid #eee;text-align:center"><p style="margin:0;font-size:12px;color:#aaa">© 2026 Your Brand. All rights reserved.</p></td></tr></table></td></tr></table></body></html>';
  formatHTML();
}

document.getElementById('html-input').addEventListener('input', function(){
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(updateAll, 180);
});

document.getElementById('html-input').addEventListener('paste', function(e){
  e.preventDefault();
  var pasted = (e.clipboardData || window.clipboardData).getData('text');
  var s = this.selectionStart, end = this.selectionEnd;
  this.value = this.value.substring(0,s) + pasted + this.value.substring(end);
  this.selectionStart = this.selectionEnd = s + pasted.length;
  try {
    this.value = html_beautify(this.value, beautifyOpts);
    showFmtFlash();
  } catch(e2) {}
  updateAll();
});

document.getElementById('html-input').addEventListener('keydown', function(e){
  if (e.key === 'Tab') {
    e.preventDefault();
    var s = this.selectionStart;
    this.value = this.value.substring(0,s) + '  ' + this.value.substring(this.selectionEnd);
    this.selectionStart = this.selectionEnd = s + 2;
  }
});

updateAll();
</script>
</body>
</html>
