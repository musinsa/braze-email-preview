<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Email Previewer</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-html.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f11;
    --bg2:       #18181c;
    --bg3:       #1e1e24;
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.14);
    --text:      #e8e8ea;
    --text2:     #888890;
    --text3:     #555560;
    --accent:    #7b6ef6;
    --accent-bg: rgba(123,110,246,0.15);
    --accent-bd: rgba(123,110,246,0.35);
    --info-bg:   rgba(56,132,255,0.12);
    --info-bd:   rgba(56,132,255,0.30);
    --info-text: #7eb8ff;
    --success:   #4caf7d;
    --danger:    #e05c5c;
    --mono: 'JetBrains Mono','Fira Code','Cascadia Code',ui-monospace,monospace;
    --sans: 'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    flex-direction: column;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 54px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    font-size: 14px; font-weight: 600; color: var(--text);
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 9px;
  }
  .logo-icon {
    width: 26px; height: 26px; background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text2);
    font-family: var(--mono);
    padding: 3px 10px;
    border: 1px solid var(--border); border-radius: 20px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite; flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .divider { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }

  .btn {
    font-size: 12px; font-family: var(--sans); font-weight: 500;
    padding: 5px 13px; border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: var(--bg3); color: var(--text); }
  .btn:disabled { opacity: 0.28; cursor: default; pointer-events: none; }
  .btn.primary { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-bd); }
  .btn.primary:hover { background: rgba(123,110,246,0.25); }
  .btn.danger:hover { color: var(--danger); border-color: rgba(224,92,92,0.4); }
  .btn-icon { padding: 5px 9px; min-width: 32px; justify-content: center; font-size: 14px; }

  /* ── Paste nudge banner ── */
  .fmt-nudge {
    display: none; align-items: center; justify-content: space-between;
    padding: 0 18px; height: 34px;
    background: var(--info-bg);
    border-bottom: 1px solid var(--info-bd);
    font-size: 12px; color: var(--info-text);
    flex-shrink: 0; gap: 12px;
  }
  .fmt-nudge.show { display: flex; }
  .nudge-right { display: flex; align-items: center; gap: 8px; }
  .nudge-btn {
    font-size: 11px; padding: 3px 10px; border-radius: 4px;
    border: 1px solid var(--info-bd);
    background: transparent; color: var(--info-text);
    cursor: pointer; font-family: var(--mono);
    transition: all 0.15s;
  }
  .nudge-btn:hover { background: rgba(56,132,255,0.15); }
  .nudge-close {
    background: none; border: none; cursor: pointer;
    color: var(--info-text); opacity: 0.55;
    font-size: 14px; padding: 0; line-height: 1;
  }
  .nudge-close:hover { opacity: 1; }

  /* ── Split ── */
  .main {
    flex: 1; display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }
  .pane { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .pane:first-child { border-right: 1px solid var(--border); }

  .pane-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; height: 36px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pane-label {
    display: flex; align-items: center; gap: 7px;
    font-size: 10px; color: var(--text2);
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .pane-label svg { opacity: 0.55; }
  .pane-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .pane-right { display: flex; align-items: center; gap: 10px; }

  /* ── CodeMirror ── */
  .editor-wrap { flex: 1; overflow: hidden; position: relative; }
  .CodeMirror {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    height: 100%;
    font-family: var(--mono);
    font-size: 13px; line-height: 1.75;
  }
  .CodeMirror-scroll { height: 100%; }
  .CodeMirror-lines { padding: 14px 0; }
  .CodeMirror pre.CodeMirror-line,
  .CodeMirror pre.CodeMirror-line-like { padding: 0 18px; }
  .CodeMirror-gutters { border-right: 1px solid rgba(255,255,255,0.07); }
  .CodeMirror-linenumber { color: var(--text3); padding: 0 10px 0 8px; }

  #preview-frame { flex: 1; border: none; width: 100%; background: #fff; }

  /* ── Stringifier ── */
  .str-section { flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg2); }
  .str-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 40px;
    border-bottom: 1px solid var(--border);
  }
  .str-label {
    display: flex; align-items: center; gap: 7px;
    font-size: 10px; color: var(--text2);
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .mode-group { display: flex; gap: 5px; }
  .mode-btn {
    font-size: 11px; font-family: var(--mono);
    padding: 3px 11px; border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text3);
    cursor: pointer; transition: all 0.15s;
  }
  .mode-btn:hover { color: var(--text2); border-color: var(--border2); }
  .mode-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-bd); }

  .str-body { position: relative; }
  #stringified {
    width: 100%; height: 90px; resize: none; border: none; outline: none;
    font-family: var(--mono); font-size: 12px; line-height: 1.6;
    padding: 12px 112px 12px 18px;
    background: var(--bg); color: var(--text2);
    overflow-y: auto;
  }
  .copy-btn {
    position: absolute; right: 12px; top: 10px;
    font-size: 12px; font-family: var(--sans); font-weight: 500;
    padding: 5px 16px; border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--bg2); color: var(--text);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover { background: var(--bg3); }
  .copy-btn.copied { color: var(--success); border-color: rgba(76,175,125,0.4); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      HTML Email Previewer
    </div>
    <div class="live-badge"><span class="live-dot"></span>실시간 미리보기</div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-icon" id="btn-undo" onclick="doUndo()" title="실행 취소 (Ctrl+Z)">↩</button>
    <button class="btn btn-icon" id="btn-redo" onclick="doRedo()" title="다시 실행 (Ctrl+Y)">↪</button>
    <div class="divider"></div>
    <button class="btn primary" onclick="formatHTML()">⌘ Format HTML</button>
    <button class="btn" onclick="loadSample()">샘플</button>
    <button class="btn danger" onclick="clearEditor()">초기화</button>
  </div>
</div>

<!-- Paste nudge -->
<div class="fmt-nudge" id="fmt-nudge">
  <span>HTML이 붙여넣어졌습니다. 포맷을 적용하시겠어요?</span>
  <div class="nudge-right">
    <button class="nudge-btn" onclick="formatHTML()">⌘ Format HTML 적용</button>
    <button class="nudge-close" onclick="hideNudge()">✕</button>
  </div>
</div>

<!-- Split -->
<div class="main">
  <div class="pane">
    <div class="pane-header">
      <div class="pane-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
        HTML 편집기
      </div>
      <div class="pane-right">
        <span id="undo-steps" style="font-size:10px;color:var(--text3);font-family:var(--mono)"></span>
        <span class="pane-meta" id="char-count">0 chars</span>
      </div>
    </div>
    <div class="editor-wrap">
      <textarea id="html-input"></textarea>
    </div>
  </div>

  <div class="pane">
    <div class="pane-header">
      <div class="pane-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        미리보기
      </div>
      <span class="pane-meta" id="preview-status">대기 중</span>
    </div>
    <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
  </div>
</div>

<!-- Stringifier -->
<div class="str-section">
  <div class="str-header">
    <div class="str-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      String Stringifier
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;color:var(--text3)">출력 형식</span>
      <div class="mode-group">
        <button class="mode-btn active" id="btn-json" onclick="setMode('json')">JSON String</button>
        <button class="mode-btn" id="btn-tmpl" onclick="setMode('template')">Template Literal</button>
        <button class="mode-btn" id="btn-mini" onclick="setMode('minified')">Minified</button>
      </div>
    </div>
  </div>
  <div class="str-body">
    <textarea id="stringified" readonly spellcheck="false"
      placeholder="HTML을 입력하면 자동으로 문자열로 변환됩니다..."></textarea>
    <button class="copy-btn" id="copy-btn" onclick="copyStr()">복사</button>
  </div>
</div>

<script>
  var mode = 'json', editor, debounceTimer;

  var beautifyOpts = {
    indent_size: 2, indent_char: ' ',
    max_preserve_newlines: 1, preserve_newlines: true,
    wrap_line_length: 0, end_with_newline: false,
    extra_liners: ['head', 'body', '/html'],
    indent_inner_html: true,
    unformatted: ['span', 'a', 'b', 'i', 'strong', 'em', 'br']
  };

  /* ── Nudge ── */
  function hideNudge() {
    document.getElementById('fmt-nudge').classList.remove('show');
  }

  /* ── Undo / Redo ── */
  function syncUndoRedo() {
    if (!editor) return;
    var h = editor.historySize();
    document.getElementById('btn-undo').disabled = h.undo === 0;
    document.getElementById('btn-redo').disabled = h.redo === 0;
    document.getElementById('undo-steps').textContent = h.undo > 0 ? h.undo + ' steps' : '';
  }
  function doUndo() { if (editor) { editor.undo(); syncUndoRedo(); } }
  function doRedo() { if (editor) { editor.redo(); syncUndoRedo(); } }

  /* ── Format ── */
  function formatHTML() {
    if (!editor) return;
    var v = editor.getValue();
    if (!v.trim()) return;
    editor.setValue(html_beautify(v, beautifyOpts));
    editor.clearHistory();
    hideNudge();
    updateAll();
    syncUndoRedo();
  }

  /* ── Editor init ── */
  function initEditor() {
    editor = CodeMirror.fromTextArea(document.getElementById('html-input'), {
      mode: 'htmlmixed',
      theme: 'dracula',
      lineNumbers: true,
      lineWrapping: false,
      tabSize: 2,
      indentWithTabs: false,
      autofocus: false,
      historyEventDelay: 500,
      extraKeys: {
        Tab:            function(cm) { cm.replaceSelection('  '); },
        'Ctrl-Z':       function(cm) { cm.undo(); syncUndoRedo(); },
        'Cmd-Z':        function(cm) { cm.undo(); syncUndoRedo(); },
        'Ctrl-Y':       function(cm) { cm.redo(); syncUndoRedo(); },
        'Shift-Ctrl-Z': function(cm) { cm.redo(); syncUndoRedo(); },
        'Shift-Cmd-Z':  function(cm) { cm.redo(); syncUndoRedo(); }
      }
    });

    editor.on('change', function(cm, change) {
      if (change.origin === 'paste') {
        document.getElementById('fmt-nudge').classList.add('show');
      }
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() {
        updateAll();
        syncUndoRedo();
      }, 180);
    });

    editor.setSize('100%', '100%');
    syncUndoRedo();
  }

  /* ── Mode ── */
  function setMode(m) {
    mode = m;
    ['json', 'tmpl', 'mini'].forEach(function(k) {
      document.getElementById('btn-' + k).classList.remove('active');
    });
    document.getElementById('btn-' + { json: 'json', template: 'tmpl', minified: 'mini' }[m]).classList.add('active');
    if (editor) updateStringifier(editor.getValue());
  }

  /* ── Update ── */
  function updateAll() {
    if (!editor) return;
    var html = editor.getValue();
    document.getElementById('char-count').textContent = html.length.toLocaleString() + ' chars';
    updatePreview(html);
    updateStringifier(html);
  }

  function updatePreview(html) {
    var frame = document.getElementById('preview-frame');
    if (!html.trim()) {
      frame.srcdoc = '<body style="display:flex;align-items:center;justify-content:center;height:100%;font-family:sans-serif;color:#ccc;font-size:13px;margin:0;background:#fafafa"><p>HTML을 입력하면 여기에 렌더링됩니다</p></body>';
      document.getElementById('preview-status').textContent = '대기 중';
      return;
    }
    frame.srcdoc = html;
    document.getElementById('preview-status').textContent = '렌더링됨';
  }

  function updateStringifier(html) {
    if (!html.trim()) { document.getElementById('stringified').value = ''; return; }
    var out;
    if (mode === 'json') {
      out = JSON.stringify(html);
    } else if (mode === 'template') {
      out = '`' + html.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\${/g, '\\${') + '`';
    } else {
      var mini = html.replace(/<!--[\s\S]*?-->/g, '').replace(/\s+/g, ' ').replace(/>\s+</g, '><').trim();
      out = JSON.stringify(mini);
    }
    document.getElementById('stringified').value = out;
  }

  /* ── Copy ── */
  function copyStr() {
    var val = document.getElementById('stringified').value;
    if (!val) return;
    var btn = document.getElementById('copy-btn');
    navigator.clipboard.writeText(val).then(function() {
      btn.textContent = '복사됨 ✓';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1800);
    }).catch(function() {
      document.getElementById('stringified').select();
      document.execCommand('copy');
    });
  }

  /* ── Clear ── */
  function clearEditor() {
    if (!editor) return;
    editor.setValue('');
    editor.clearHistory();
    hideNudge();
    updateAll();
    syncUndoRedo();
  }

  /* ── Sample ── */
  function loadSample() {
    var s = '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>이메일</title></head><body style="margin:0;padding:0;background:#f4f4f4;font-family:\'Apple SD Gothic Neo\',Arial,sans-serif"><table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:40px 0"><tr><td align="center"><table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)"><tr><td style="background:#1a1a2e;padding:32px 40px;text-align:center"><h1 style="color:#fff;margin:0;font-size:24px;font-weight:600">Your Brand</h1></td></tr><tr><td style="padding:40px"><h2 style="margin:0 0 16px;font-size:20px;color:#1a1a2e;font-weight:600">안녕하세요, 홍길동 님 \uD83D\uDC4B</h2><p style="margin:0 0 24px;font-size:15px;color:#555;line-height:1.7">저희 서비스를 이용해 주셔서 감사합니다.</p><div style="text-align:center;margin:32px 0"><a href="#" style="display:inline-block;background:#5b5ef4;color:#fff;text-decoration:none;padding:14px 36px;border-radius:6px;font-size:15px;font-weight:600">계정 확인하기</a></div></td></tr><tr><td style="padding:24px 40px;background:#f9f9f9;border-top:1px solid #eee;text-align:center"><p style="margin:0;font-size:12px;color:#aaa">&copy; 2026 Your Brand. All rights reserved.</p></td></tr></table></td></tr></table></body></html>';
    editor.setValue(s);
    document.getElementById('fmt-nudge').classList.add('show');
    updateAll();
    syncUndoRedo();
  }

  window.addEventListener('DOMContentLoaded', function() {
    initEditor();
    updateAll();
  });
</script>
</body>
</html>
